apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: smart-task
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: smart-task-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: smart-task-config
            - secretRef:
                name: smart-task-secret
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: smart-task
spec:
  selector:
    app: fastapi
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP